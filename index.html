<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ポーカー接続テスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="setup-screen">
            <h1>ポーカー</h1>
            
            <div id="host-section">
                <h2>ルーム作成</h2>
                <input type="text" id="host-name" placeholder="名前" maxlength="10">
                
                <label>バイイン（初期チップ）</label>
                <input type="number" id="buyin-input" value="1000" min="100" step="100">
                
                <label>スモールブラインド</label>
                <input type="number" id="sb-input" value="10" min="5" step="5">
                
                <label>ビッグブラインド</label>
                <input type="number" id="bb-input" value="20" min="10" step="10">
                
                <button id="create-room">ルーム作成して参加</button>
            </div>
            
            <div id="join-section">
                <h2>参加</h2>
                <input type="text" id="room-id-input" placeholder="ルームID">
                <input type="text" id="player-name" placeholder="名前" maxlength="10">
                <button id="join-room">参加</button>
            </div>
        </div>
        
        <div id="game-screen" style="display:none;">
            <div id="top-bar">
                <div id="room-id-info"></div>
                <button id="host-menu-btn" style="display:none;">⚙️</button>
            </div>
            
            <div id="game-area"></div>
            
            <!-- Host Menu Modal -->
            <div id="host-modal" class="modal" style="display:none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>ホストメニュー</h3>
                        <button id="close-host-modal" class="close-btn">×</button>
                    </div>
                    <div class="modal-body">
                        <button id="start-game" class="modal-btn">ゲーム開始</button>
                        
                        <div class="blinds-section">
                            <h4>ブラインド設定</h4>
                            <div class="input-group">
                                <label>SB</label>
                                <input type="number" id="sb-control" min="5" step="5">
                            </div>
                            <div class="input-group">
                                <label>BB</label>
                                <input type="number" id="bb-control" min="10" step="10">
                            </div>
                            <button id="update-blinds" class="modal-btn">更新</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
